name: Live Proof

permissions: {}

on:
  workflow_dispatch:

jobs:
  verify:
    name: Steward proof
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Verify live Steward proof
        run: ./scripts/verify-steward-proof.sh
